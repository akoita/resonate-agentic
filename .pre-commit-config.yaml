# Local guardrails — install with: pip install pre-commit && pre-commit install
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint)
        entry: python -m ruff check app tests
        language: system
        pass_filenames: false
      - id: harness-guardrails
        name: harness guardrails (AGENTS.md hard rules)
        entry: python scripts/harness_guardrails.py
        language: system
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ["--maxkb=1024"]
