name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip ruff pip-audit

      - name: Harness guardrails (secrets · leaked host · portability · async tools)
        run: python scripts/harness_guardrails.py

      - name: Bandit-style lint (ruff S rules)
        run: python -m ruff check --select S app

      - name: Dependency audit (informational)
        run: pip-audit -r requirements.txt || true
