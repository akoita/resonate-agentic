name: "🤖 Agent task"
description: A well-specified task to delegate to a coding agent (orchestrator mode).
title: "[agent] "
labels: ["agent-task"]
body:
  - type: markdown
    attributes:
      value: |
        Specify this tightly enough that an agent can complete it and open a PR that passes `make check`.
        Tests/evals are the contract — state them.
  - type: textarea
    id: goal
    attributes:
      label: Goal (intent, not implementation)
      placeholder: "What outcome do we want? Why?"
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria / tests
      description: How will we know it's correct? List the tests/evals that must pass.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context & constraints
      description: Relevant files, ADRs, hard rules that apply (AGENTS.md), and what NOT to change.
  - type: input
    id: backlog
    attributes:
      label: Backlog ID / ADR
      placeholder: "BL-0x / ADR-00xx"
  - type: input
    id: plan
    attributes:
      label: Implementation plan
      description: For non-trivial work, write one from docs/plans/_TEMPLATE.md and link it here.
      placeholder: "docs/plans/<issue>-<slug>.md"
