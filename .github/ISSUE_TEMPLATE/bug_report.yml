name: "🐛 Bug report"
description: Something doesn't work as expected.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened vs. expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Include the command, input, and any error/stack trace.
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "Python 3.x · ADK 2.x · OS · commit"
